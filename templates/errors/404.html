{% extends 'base.html' %}

{% block title %}404 - Page Not Found - ShopNest{% endblock %}

{% block content %}

<div class="section" style="min-height: 70vh; display: flex; align-items: center; justify-content: center;">
  <div class="container" style="max-width: 600px; text-align: center;">
    <div style="font-size: 120px; font-weight: 700; color: var(--primary); margin-bottom: 24px;">
      404
    </div>
    <h1 style="font-size: 36px; font-weight: 700; margin-bottom: 16px;">Page Not Found</h1>
    <p style="font-size: 18px; color: var(--text-secondary); margin-bottom: 32px;">
      Oops! The page you're looking for doesn't exist. It might have been moved or deleted.
    </p>

    <div style="display: flex; gap: 16px; justify-content: center;">
      <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-lg">
        <i class="fas fa-home"></i>
        Go Home
      </a>
      <a href="{{ url_for('products.list') }}" class="btn btn-outline btn-lg">
        <i class="fas fa-shopping-bag"></i>
        Browse Products
      </a>
    </div>
  </div>
</div>

{% endblock %}
