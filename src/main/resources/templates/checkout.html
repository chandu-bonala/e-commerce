<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Checkout - ShopNest')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div th:if="${errorMessage}" data-flash="error" style="display:none;" th:text="${errorMessage}"></div>

<div class="breadcrumb-bar">
    <div class="container">
        <div class="breadcrumb">
            <a href="/">Home</a> <span class="separator">/</span>
            <a href="/cart">Cart</a> <span class="separator">/</span>
            <span>Checkout</span>
        </div>
    </div>
</div>

<section class="checkout-page">
    <div class="container">
        <h1 style="margin-bottom:32px;"><i class="fas fa-lock" style="color:var(--primary);"></i> Secure Checkout</h1>

        <form th:action="@{/orders/place}" method="post">
            <div class="checkout-layout">
                <!-- Checkout Form -->
                <div>
                    <div class="checkout-form-section" style="margin-bottom:24px;">
                        <h2><span class="step-number">1</span> Shipping Address</h2>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" th:value="${currentUser.name}" readonly>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" th:value="${currentUser.email}" readonly>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Street Address *</label>
                            <input type="text" name="address" class="form-control" placeholder="123 Main Street, Apt 4B" required
                                   th:value="${currentUser.address}">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">City *</label>
                                <input type="text" name="city" class="form-control" placeholder="New York" required
                                       th:value="${currentUser.city}">
                            </div>
                            <div class="form-group">
                                <label class="form-label">State *</label>
                                <input type="text" name="state" class="form-control" placeholder="NY" required
                                       th:value="${currentUser.state}">
                            </div>
                        </div>
                        <div class="form-group" style="max-width:200px;">
                            <label class="form-label">ZIP Code *</label>
                            <input type="text" name="zipCode" class="form-control" placeholder="10001" required
                                   th:value="${currentUser.zipCode}">
                        </div>
                    </div>

                    <div class="checkout-form-section">
                        <h2><span class="step-number">2</span> Payment Method</h2>
                        <div class="payment-methods">
                            <div class="payment-method selected" onclick="selectPayment(this)">
                                <input type="radio" name="paymentMethod" value="CARD" checked>
                                <i class="fas fa-credit-card"></i>
                                <span>Credit Card</span>
                            </div>
                            <div class="payment-method" onclick="selectPayment(this)">
                                <input type="radio" name="paymentMethod" value="UPI">
                                <i class="fas fa-mobile-alt"></i>
                                <span>UPI</span>
                            </div>
                            <div class="payment-method" onclick="selectPayment(this)">
                                <input type="radio" name="paymentMethod" value="NETBANKING">
                                <i class="fas fa-university"></i>
                                <span>Net Banking</span>
                            </div>
                            <div class="payment-method" onclick="selectPayment(this)">
                                <input type="radio" name="paymentMethod" value="COD">
                                <i class="fas fa-money-bill-wave"></i>
                                <span>Cash on Delivery</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Order Summary -->
                <div class="cart-summary">
                    <h2>Order Summary</h2>
                    <div th:each="item : ${cartItems}" style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--gray-100);">
                        <div style="width:56px;height:56px;border-radius:8px;overflow:hidden;background:var(--gray-100);flex-shrink:0;">
                            <img th:src="${item.product.image}" th:alt="${item.product.name}" style="width:100%;height:100%;object-fit:cover;">
                        </div>
                        <div style="flex:1;">
                            <p style="font-size:0.85rem;font-weight:600;" th:text="${item.product.name}">Product</p>
                            <p style="font-size:0.8rem;color:var(--text-muted);" th:text="'Qty: ' + ${item.quantity}">Qty: 1</p>
                        </div>
                        <span style="font-weight:700;font-size:0.9rem;" th:text="'$' + ${#numbers.formatDecimal(item.subtotal, 1, 2)}">$99.99</span>
                    </div>
                    <div class="cart-summary-row">
                        <span>Subtotal</span>
                        <span th:text="'$' + ${#numbers.formatDecimal(cartTotal, 1, 2)}">$0.00</span>
                    </div>
                    <div class="cart-summary-row">
                        <span>Shipping</span>
                        <span style="color:var(--success);font-weight:600;"
                              th:text="${cartTotal >= 50} ? 'FREE' : '$5.99'">FREE</span>
                    </div>
                    <div class="cart-summary-row">
                        <span>Tax (8%)</span>
                        <span th:text="'$' + ${#numbers.formatDecimal(cartTotal * 0.08, 1, 2)}">$0.00</span>
                    </div>
                    <div class="cart-summary-row total">
                        <span>Total</span>
                        <span th:text="'$' + ${#numbers.formatDecimal(cartTotal + (cartTotal >= 50 ? 0 : 5.99) + cartTotal * 0.08, 1, 2)}">$0.00</span>
                    </div>
                    <button type="submit" class="btn btn-success btn-block btn-lg" style="margin-top:20px;">
                        <i class="fas fa-check-circle"></i> Place Order
                    </button>
                    <a href="/cart" class="btn btn-ghost btn-block" style="margin-top:8px;">
                        <i class="fas fa-arrow-left"></i> Back to Cart
                    </a>
                </div>
            </div>
        </form>
    </div>
</section>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="/js/main.js"></script>
<script>
    function selectPayment(el) {
        document.querySelectorAll('.payment-method').forEach(m => m.classList.remove('selected'));
        el.classList.add('selected');
        el.querySelector('input[type="radio"]').checked = true;
    }
</script>
</body>
</html>
