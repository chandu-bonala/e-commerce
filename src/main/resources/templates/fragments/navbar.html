<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar">
    <div class="container">
        <div class="navbar-content">
            <a href="/" class="navbar-brand">
                <i class="fas fa-shopping-bag"></i> ShopNest
            </a>
            <div class="navbar-search">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="search-input" class="search-input" placeholder="Search for products...">
            </div>
            <div class="navbar-actions">
                <a sec:authorize="isAuthenticated()" href="/cart" class="nav-icon-btn">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-badge" th:if="${cartCount != null && cartCount > 0}" th:text="${cartCount}">0</span>
                </a>
                <a sec:authorize="isAuthenticated()" href="/orders/my-orders" class="nav-icon-btn">
                    <i class="fas fa-box"></i>
                </a>
                <div sec:authorize="hasRole('ADMIN')">
                    <a href="/admin/dashboard" class="btn btn-sm" style="background:var(--accent);color:var(--gray-900);font-weight:700;">
                        <i class="fas fa-tachometer-alt"></i> Admin
                    </a>
                </div>
                <div sec:authorize="isAuthenticated()" class="user-menu" style="display:flex;align-items:center;gap:8px;">
                    <div class="user-avatar" th:if="${currentUser != null}" th:text="${currentUser.initials}">UN</div>
                    <a href="/logout" class="nav-icon-btn" title="Logout">
                        <i class="fas fa-sign-out-alt"></i>
                    </a>
                </div>
                <a sec:authorize="!isAuthenticated()" href="/login" class="btn btn-ghost btn-sm">
                    <i class="fas fa-sign-in-alt"></i> Login
                </a>
                <a sec:authorize="!isAuthenticated()" href="/register" class="btn btn-primary btn-sm">
                    <i class="fas fa-user-plus"></i> Sign Up
                </a>
            </div>
            <button class="nav-toggle"><i class="fas fa-bars"></i></button>
        </div>
    </div>
</nav>
</body>
</html>
