<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Login - ShopNest')}"></head>
<body>
<div class="auth-page">
    <!-- Left Panel -->
    <div class="auth-left">
        <div class="auth-left-content">
            <div class="auth-brand">
                <i class="fas fa-shopping-bag"></i> ShopNest
            </div>
            <h2>Welcome Back!</h2>
            <p>Log in to access your account, track your orders, and enjoy personalized shopping experiences.</p>
            <div style="margin-top:48px;display:flex;gap:24px;justify-content:center;">
                <div style="text-align:center;">
                    <div style="font-size:1.5rem;font-weight:800;color:white;">10K+</div>
                    <div style="font-size:0.8rem;color:var(--gray-400);">Products</div>
                </div>
                <div style="text-align:center;">
                    <div style="font-size:1.5rem;font-weight:800;color:white;">50K+</div>
                    <div style="font-size:0.8rem;color:var(--gray-400);">Customers</div>
                </div>
                <div style="text-align:center;">
                    <div style="font-size:1.5rem;font-weight:800;color:white;">4.9</div>
                    <div style="font-size:0.8rem;color:var(--gray-400);">Rating</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Right Panel - Form -->
    <div class="auth-right">
        <div class="auth-form-container">
            <h1>Sign In</h1>
            <p>Enter your credentials to access your account</p>

            <div th:if="${errorMessage}" class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${errorMessage}">Error</span>
            </div>
            <div th:if="${successMessage}" class="alert alert-success">
                <i class="fas fa-check-circle"></i>
                <span th:text="${successMessage}">Success</span>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label" style="display:flex;justify-content:space-between;">
                        Password
                        <a href="#" style="color:var(--primary);font-weight:500;font-size:0.8rem;">Forgot password?</a>
                    </label>
                    <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                </div>
                <div class="form-group">
                    <label class="form-check">
                        <input type="checkbox" name="remember-me">
                        Remember me
                    </label>
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="/register">Create one</a>
            </div>

            <div style="text-align:center;margin-top:24px;">
                <a href="/" style="color:var(--text-muted);font-size:0.85rem;">
                    <i class="fas fa-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
