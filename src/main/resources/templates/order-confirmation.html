<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Order Confirmed - ShopNest')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<section class="confirmation-page">
    <div class="container" style="max-width:700px;">
        <div class="confirmation-icon">
            <i class="fas fa-check"></i>
        </div>
        <h1 style="margin-bottom:8px;">Order Confirmed!</h1>
        <p class="text-muted" style="margin-bottom:8px;">Thank you for your purchase. Your order has been placed successfully.</p>
        <p style="font-size:1.1rem;font-weight:700;color:var(--primary);margin-bottom:32px;">
            Order #<span th:text="${order.orderNumber}">SN-XXXXXXXX</span>
        </p>

        <div class="card" style="text-align:left;margin-bottom:24px;">
            <div class="card-body">
                <h3 style="margin-bottom:20px;">Order Details</h3>
                <div th:each="item : ${order.orderItems}" style="display:flex;align-items:center;gap:16px;padding:12px 0;border-bottom:1px solid var(--gray-100);">
                    <div style="width:60px;height:60px;border-radius:8px;overflow:hidden;background:var(--gray-100);flex-shrink:0;">
                        <img th:src="${item.product.image}" style="width:100%;height:100%;object-fit:cover;">
                    </div>
                    <div style="flex:1;">
                        <p style="font-weight:600;" th:text="${item.product.name}">Product</p>
                        <p style="font-size:0.8rem;color:var(--text-muted);" th:text="'Qty: ' + ${item.quantity}">Qty: 1</p>
                    </div>
                    <span style="font-weight:700;" th:text="'$' + ${#numbers.formatDecimal(item.subtotal, 1, 2)}">$0.00</span>
                </div>
                <div style="display:flex;justify-content:space-between;padding-top:16px;font-size:1.1rem;font-weight:700;">
                    <span>Total</span>
                    <span th:text="'$' + ${#numbers.formatDecimal(order.totalPrice, 1, 2)}">$0.00</span>
                </div>
            </div>
        </div>

        <div class="card" style="text-align:left;margin-bottom:32px;">
            <div class="card-body">
                <h4 style="margin-bottom:12px;">Shipping Address</h4>
                <p style="color:var(--text-secondary);">
                    <span th:text="${order.shippingAddress}">Address</span><br>
                    <span th:text="${order.shippingCity} + ', ' + ${order.shippingState} + ' ' + ${order.shippingZip}">City, State ZIP</span>
                </p>
            </div>
        </div>

        <div style="display:flex;gap:16px;justify-content:center;">
            <a href="/orders/my-orders" class="btn btn-primary"><i class="fas fa-box"></i> View My Orders</a>
            <a href="/products" class="btn btn-outline"><i class="fas fa-shopping-bag"></i> Continue Shopping</a>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="/js/main.js"></script>
</body>
</html>
