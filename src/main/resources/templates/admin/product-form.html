<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Add Product - ShopNest Admin')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<section style="padding:40px 0 80px;">
    <div class="container" style="max-width:720px;">
        <div style="margin-bottom:32px;">
            <a href="/admin/dashboard" style="color:var(--primary);font-size:0.9rem;font-weight:600;">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>

        <div class="checkout-form-section">
            <h2 th:text="${product.id != null ? 'Edit Product' : 'Add New Product'}">
                <i class="fas fa-box" style="color:var(--primary);margin-right:8px;"></i>
            </h2>

            <form th:action="@{/admin/products/save}" method="post" th:object="${product}">
                <input type="hidden" th:field="*{id}">

                <div class="form-group">
                    <label class="form-label">Product Name *</label>
                    <input type="text" th:field="*{name}" class="form-control" placeholder="Enter product name" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea th:field="*{description}" class="form-control" rows="4" placeholder="Product description..."
                              style="resize:vertical;"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Price *</label>
                        <input type="number" th:field="*{price}" class="form-control" step="0.01" min="0.01" placeholder="99.99" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Original Price (for discount)</label>
                        <input type="number" th:field="*{originalPrice}" class="form-control" step="0.01" min="0" placeholder="129.99">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Category *</label>
                        <select name="categoryId" class="form-select" required>
                            <option value="" disabled selected>Select category</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                                    th:selected="${product.category != null && product.category.id == cat.id}">Category</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Brand</label>
                        <input type="text" th:field="*{brand}" class="form-control" placeholder="Brand name">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Image URL *</label>
                    <input type="text" th:field="*{image}" class="form-control" placeholder="https://example.com/image.jpg" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Stock *</label>
                        <input type="number" th:field="*{stock}" class="form-control" min="0" placeholder="100" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Rating (0-5)</label>
                        <input type="number" th:field="*{rating}" class="form-control" step="0.1" min="0" max="5" placeholder="4.5">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Review Count</label>
                        <input type="number" th:field="*{reviewCount}" class="form-control" min="0" placeholder="0">
                    </div>
                    <div class="form-group" style="display:flex;align-items:end;">
                        <label class="form-check">
                            <input type="checkbox" th:field="*{featured}">
                            Featured Product
                        </label>
                    </div>
                </div>

                <div style="display:flex;gap:12px;margin-top:24px;">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="fas fa-save"></i>
                        <span th:text="${product.id != null ? 'Update Product' : 'Add Product'}">Save</span>
                    </button>
                    <a href="/admin/dashboard" class="btn btn-ghost btn-lg">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="/js/main.js"></script>
</body>
</html>
