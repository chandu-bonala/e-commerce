<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('My Orders - ShopNest')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="breadcrumb-bar">
    <div class="container">
        <div class="breadcrumb">
            <a href="/">Home</a> <span class="separator">/</span> <span>My Orders</span>
        </div>
    </div>
</div>

<section style="padding:40px 0 80px;">
    <div class="container">
        <h1 style="margin-bottom:32px;"><i class="fas fa-box" style="color:var(--primary);"></i> My Orders</h1>

        <div th:if="${orders == null || orders.isEmpty()}" class="empty-cart">
            <i class="fas fa-box-open"></i>
            <h2>No orders yet</h2>
            <p>You haven't placed any orders yet. Start shopping!</p>
            <a href="/products" class="btn btn-primary btn-lg"><i class="fas fa-shopping-bag"></i> Shop Now</a>
        </div>

        <div th:if="${orders != null && !orders.isEmpty()}">
            <table class="orders-table">
                <thead>
                    <tr>
                        <th>Order #</th>
                        <th>Date</th>
                        <th>Items</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Payment</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${orders}">
                        <td style="font-weight:600;color:var(--primary);" th:text="${order.orderNumber}">SN-XXX</td>
                        <td th:text="${#temporals.format(order.createdAt, 'MMM dd, yyyy')}">Jan 01, 2026</td>
                        <td th:text="${order.itemCount} + ' items'">1 items</td>
                        <td style="font-weight:700;" th:text="'$' + ${#numbers.formatDecimal(order.totalPrice, 1, 2)}">$0.00</td>
                        <td>
                            <span class="status-badge"
                                  th:classappend="${order.status.name().toLowerCase()}"
                                  th:text="${order.status}">PENDING</span>
                        </td>
                        <td th:text="${order.paymentMethod}">CARD</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="/js/main.js"></script>
</body>
</html>
